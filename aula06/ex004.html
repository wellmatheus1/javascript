<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ex04 JS</title>
    <style>
        body {
            font: normal 20pt arial, sans-serif;
        }
    </style>
  </head>
  <body>
    <script>
        var nome = window.prompt('Qual é o seu nome?')
        document.write(`Fala, ${nome}! Seu nome tem ${nome.length} letras.</br>`);
        document.write(`Seu nome em maiúsculas fica ${nome.toUpperCase()}<br>`);
        document.write(`Seu nome em minúsculas fica ${nome.toLowerCase()}`);
    </script>
  </body>
</html>
